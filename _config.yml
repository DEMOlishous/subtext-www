title: Project Subtext
description: Portable souls. Developing personalities. Functional teams.
url: "https://demolishous.github.io"
baseurl: "/subtext-www"
permalink: /:year/:month/:day/:title/

# Build settings
markdown: kramdown
theme: null
plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - drafts/
  - vendor/
  - .bundle/

# SEO
author:
  name: 7R1PL3F0RC3 squad
twitter: {}

collections:
  squad:
    output: true
    permalink: /7r1pl3f0rc3/:path/

# Defaults — every post gets the post layout, every page gets default,
# every squad piece gets squad-piece.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: default
  - scope:
      path: ""
      type: squad
    values:
      layout: squad-piece
