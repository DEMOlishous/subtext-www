<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"
     font-family="ui-monospace, 'JetBrains Mono', 'Berkeley Mono', monospace"
     style="background:#0A0A0A;">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="#0A0A0A"/>

  <g id="chrome">
    <text x="60" y="80" fill="#E8E6E3" fill-opacity="0.92" font-size="42">subtext</text>
    <text x="60" y="120" fill="#E8E6E3" fill-opacity="0.55" font-size="20">ten sealed boxes, same machine</text>
    <g transform="translate(60, 990)">
      <text fill="#E8E6E3" fill-opacity="0.45" font-size="16">
        ─ session 2026-04-25 · 207 messages · 10 peers · 1 machine ─
      </text>
      <text y="26" fill="#E8E6E3" fill-opacity="0.30" font-size="13">
        edges pulse on real send_message timestamps · solid layer = the room · dotted layer = the subtext
      </text>
    </g>
  </g>

