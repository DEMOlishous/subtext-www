<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" role="img" aria-label="Spectral signatures of one paragraph in five languages — raw eigenvalues then size-robust participation ratio">
  <title>Spectral signatures across five languages — eigenvalues vs. participation ratio</title>
  <desc>Animated visualization. Left panel: raw normalized-Laplacian eigenvalues of the same paragraph extracted into five language graphs (English, German, Japanese, Mandarin, Spanish). Right panel: per-eigenmode participation ratio for the same graphs. Each curve draws in language-by-language. The left panel reads as 'Japanese is alien, English is the outlier' — but that's the n=39 vs n=80 graph-size confound. The right panel uses the size-robust signature; the same five graphs cluster within Wasserstein distance 0.016–0.037. Both pictures are real measurements. Only the right one is interpretable as a similarity claim.</desc>

  <defs>
    <style>
      .axis        { stroke: rgba(232,230,227,0.18); stroke-width: 1; fill: none; }
      .grid        { stroke: rgba(232,230,227,0.08); stroke-width: 1; fill: none; stroke-dasharray: 2 4; }
      .tick        { fill: rgba(232,230,227,0.55); font: 11px ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace; }
      .label       { fill: rgba(232,230,227,0.55); font: 12px ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace; letter-spacing: 0.05em; }
      .panel-title { fill: rgba(232,230,227,0.32); font: 11px ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace; text-transform: uppercase; letter-spacing: 0.18em; }
      .legend      { fill: #E8E6E3; font: 12px ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace; }
      .curve       { fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
      .verdict     { fill: rgba(232,230,227,0.55); font: 12px ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace; }
    </style>
  </defs>

  <rect width="880" height="460" fill="#0A0A0A"/>

  <!--
    Layout: two panels side-by-side, plot area 360w × 280h each.
      Left panel:  x ∈ [40, 400], y maps eig 0..1.3 → y 360..80
      Right panel: x ∈ [480, 840], y maps PR 0..0.40 → y 360..80
    All polyline points generated from real data — see SAUSAGE-PARTY/code/lspy-spectral-demo.py
    Source: graphs_translation/sample5{,_german,_japanese,_mandarin,_spanish}.json
  -->

  <!-- Panel A — RAW EIGENVALUES -->
  <g id="panel-eig">
    <text class="panel-title" x="40" y="56">Raw eigenvalues  ·  size-confounded</text>
    <line class="axis" x1="40"  y1="360" x2="400" y2="360"/>
    <line class="axis" x1="40"  y1="80"  x2="40"  y2="360"/>
    <line class="grid" x1="40"  y1="184" x2="400" y2="184"/>
    <line class="grid" x1="40"  y1="272" x2="400" y2="272"/>
    <text class="tick" x="34"  y="364" text-anchor="end">0</text>
    <text class="tick" x="34"  y="276" text-anchor="end">0.5</text>
    <text class="tick" x="34"  y="188" text-anchor="end">1.0</text>
    <text class="tick" x="40"  y="380" text-anchor="middle">1</text>
    <text class="tick" x="220" y="380" text-anchor="middle">10</text>
    <text class="tick" x="400" y="380" text-anchor="middle">20</text>
    <text class="label" x="220" y="402" text-anchor="middle">eigenvalue index (λ₀=0 dropped)</text>
    <text class="label" x="20"  y="220" text-anchor="middle" transform="rotate(-90 20 220)">λ</text>

    <g class="curves">
      <polyline class="curve" stroke="#7AC8B8" stroke-dasharray="2000" stroke-dashoffset="2000" points="40.0,352.9 58.9,348.5 77.9,342.0 96.8,337.7 115.8,331.1 134.7,331.1 153.7,331.1 172.6,326.0 191.6,320.5 210.5,320.5 229.5,319.9 248.4,309.8 267.4,296.9 286.3,296.9 305.3,296.9 324.2,296.9 343.2,296.9 362.1,296.9 381.1,295.0 400.0,264.2">
        <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="1.4s" begin="0.4s" fill="freeze"/>
      </polyline>
      <polyline class="curve" stroke="#9DB3E5" stroke-dasharray="2000" stroke-dashoffset="2000" points="40.0,346.7 58.9,344.8 77.9,342.9 96.8,339.8 115.8,337.3 134.7,333.2 153.7,325.6 172.6,317.2 191.6,308.6 210.5,296.9 229.5,296.9 248.4,296.9 267.4,296.9 286.3,296.9 305.3,296.9 324.2,231.9 343.2,222.4 362.1,177.5 381.1,144.6 400.0,144.6">
        <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="1.4s" begin="0.7s" fill="freeze"/>
      </polyline>
      <polyline class="curve" stroke="#E5C36F" stroke-dasharray="2000" stroke-dashoffset="2000" points="40.0,339.7 58.9,323.3 77.9,316.2 96.8,313.4 115.8,296.9 134.7,296.9 153.7,296.9 172.6,296.9 191.6,296.9 210.5,296.9 229.5,296.9 248.4,296.9 267.4,277.2 286.3,217.3 305.3,144.6 324.2,144.6 343.2,144.6 362.1,144.6 381.1,144.6 400.0,144.6">
        <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="1.4s" begin="1.0s" fill="freeze"/>
      </polyline>
      <polyline class="curve" stroke="#C99CD8" stroke-dasharray="2000" stroke-dashoffset="2000" points="40.0,360.0 58.9,344.2 77.9,339.4 96.8,320.5 115.8,316.7 134.7,296.9 153.7,296.9 172.6,296.9 191.6,296.9 210.5,296.9 229.5,296.9 248.4,296.9 267.4,296.9 286.3,296.9 305.3,296.9 324.2,296.9 343.2,296.9 362.1,296.9 381.1,296.9 400.0,296.9">
        <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="1.4s" begin="1.3s" fill="freeze"/>
      </polyline>
      <polyline class="curve" stroke="#E89B8A" stroke-dasharray="2000" stroke-dashoffset="2000" points="40.0,360.0 58.9,360.0 77.9,352.7 96.8,348.5 115.8,334.4 134.7,327.5 153.7,316.9 172.6,313.8 191.6,307.3 210.5,296.9 229.5,296.9 248.4,296.9 267.4,296.9 286.3,296.9 305.3,296.9 324.2,296.9 343.2,296.9 362.1,296.9 381.1,296.9 400.0,296.9">
        <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="1.4s" begin="1.6s" fill="freeze"/>
      </polyline>
    </g>

    <text class="verdict" x="220" y="438" text-anchor="middle" opacity="0">
      Japanese looks alien. English the outlier. (It's the n=39 vs n=80.)
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="3.4s" fill="freeze"/>
    </text>
  </g>

  <!-- Panel B — PARTICIPATION RATIO -->
  <g id="panel-pr">
    <text class="panel-title" x="480" y="56">Participation ratio  ·  size-robust</text>
    <line class="axis" x1="480" y1="360" x2="840" y2="360"/>
    <line class="axis" x1="480" y1="80"  x2="480" y2="360"/>
    <line class="grid" x1="480" y1="220" x2="840" y2="220"/>
    <line class="grid" x1="480" y1="290" x2="840" y2="290"/>
    <text class="tick" x="474" y="364" text-anchor="end">0</text>
    <text class="tick" x="474" y="294" text-anchor="end">0.10</text>
    <text class="tick" x="474" y="224" text-anchor="end">0.20</text>
    <text class="tick" x="474" y="84"  text-anchor="end">0.40</text>
    <text class="tick" x="480" y="380" text-anchor="middle">1</text>
    <text class="tick" x="660" y="380" text-anchor="middle">10</text>
    <text class="tick" x="840" y="380" text-anchor="middle">20</text>
    <text class="label" x="660" y="402" text-anchor="middle">eigenmode index</text>
    <text class="label" x="460" y="220" text-anchor="middle" transform="rotate(-90 460 220)">PR</text>

    <g class="curves">
      <polyline class="curve" stroke="#7AC8B8" stroke-dasharray="2000" stroke-dashoffset="2000" points="480.0,304.4 498.9,170.4 517.9,296.2 536.8,273.1 555.8,277.1 574.7,274.0 593.7,263.9 612.6,138.3 631.6,313.3 650.5,313.3 669.5,303.2 688.4,107.7 707.4,327.4 726.3,332.3 745.3,319.1 764.2,326.4 783.2,325.1 802.1,297.4 821.1,325.7 840.0,319.9">
        <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="1.4s" begin="4.0s" fill="freeze"/>
      </polyline>
      <polyline class="curve" stroke="#9DB3E5" stroke-dasharray="2000" stroke-dashoffset="2000" points="480.0,261.0 498.9,224.6 517.9,273.8 536.8,247.6 555.8,285.3 574.7,276.7 593.7,219.5 612.6,242.0 631.6,99.0 650.5,232.2 669.5,300.4 688.4,205.3 707.4,312.1 726.3,315.6 745.3,310.2 764.2,315.3 783.2,306.9 802.1,285.2 821.1,269.1 840.0,278.5">
        <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="1.4s" begin="4.3s" fill="freeze"/>
      </polyline>
      <polyline class="curve" stroke="#E5C36F" stroke-dasharray="2000" stroke-dashoffset="2000" points="480.0,276.6 498.9,202.6 517.9,152.5 536.8,218.7 555.8,172.9 574.7,259.3 593.7,306.5 612.6,236.5 631.6,242.2 650.5,260.5 669.5,243.1 688.4,175.6 707.4,251.1 726.3,289.8 745.3,316.2 764.2,322.2 783.2,303.5 802.1,317.8 821.1,301.1 840.0,242.8">
        <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="1.4s" begin="4.6s" fill="freeze"/>
      </polyline>
      <polyline class="curve" stroke="#C99CD8" stroke-dasharray="2000" stroke-dashoffset="2000" points="480.0,146.6 498.9,302.2 517.9,297.5 536.8,301.1 555.8,233.4 574.7,244.5 593.7,268.1 612.6,294.1 631.6,320.7 650.5,287.8 669.5,295.2 688.4,239.7 707.4,265.1 726.3,276.8 745.3,141.5 764.2,258.6 783.2,242.1 802.1,263.0 821.1,329.7 840.0,284.0">
        <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="1.4s" begin="4.9s" fill="freeze"/>
      </polyline>
      <polyline class="curve" stroke="#E89B8A" stroke-dasharray="2000" stroke-dashoffset="2000" points="480.0,330.4 498.9,330.4 517.9,266.4 536.8,264.4 555.8,252.7 574.7,270.3 593.7,289.9 612.6,298.1 631.6,258.2 650.5,152.7 669.5,282.7 688.4,304.5 707.4,218.6 726.3,256.5 745.3,267.4 764.2,325.5 783.2,231.0 802.1,257.6 821.1,230.2 840.0,261.2">
        <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="1.4s" begin="5.2s" fill="freeze"/>
      </polyline>
    </g>

    <text class="verdict" x="660" y="438" text-anchor="middle" opacity="0">
      Same five graphs. Different metric. Tight cluster, W₁ ≈ 0.016–0.037.
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="7.0s" fill="freeze"/>
    </text>
  </g>

  <!-- Legend (top-center, single row), fades in once first two curves are drawing -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="2.4s" fill="freeze"/>
    <g transform="translate(168, 22)">
      <line class="curve" stroke="#7AC8B8" x1="0"   y1="0" x2="20" y2="0"/>
      <text class="legend" x="26"  y="4">English</text>
      <line class="curve" stroke="#9DB3E5" x1="100" y1="0" x2="120" y2="0"/>
      <text class="legend" x="126" y="4">German</text>
      <line class="curve" stroke="#E5C36F" x1="200" y1="0" x2="220" y2="0"/>
      <text class="legend" x="226" y="4">Japanese</text>
      <line class="curve" stroke="#C99CD8" x1="306" y1="0" x2="326" y2="0"/>
      <text class="legend" x="332" y="4">Mandarin</text>
      <line class="curve" stroke="#E89B8A" x1="412" y1="0" x2="432" y2="0"/>
      <text class="legend" x="438" y="4">Spanish</text>
    </g>
  </g>
</svg>
