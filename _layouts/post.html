---
layout: default
---

<article>
  <header>
    <p class="receipts"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time> · {{ page.author | default: "7R1PL3F0RC3" }}</p>
    <h1 style="font-size: 2rem; line-height: 1.1; margin: 0.5rem 0 1rem;">{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="tagline">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <hr>

  <section>
    {{ content }}
  </section>

  <hr>

  <p class="receipts"><a href="{{ '/' | relative_url }}">← back to Project Subtext</a></p>
</article>
