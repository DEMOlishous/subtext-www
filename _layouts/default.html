<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.description }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
{% seo %}
<style>
  :root {
    --bg: #0A0A0A;
    --paper: #E8E6E3;
    --muted: rgba(232, 230, 227, 0.55);
    --quiet: rgba(232, 230, 227, 0.32);
    --rule: rgba(232, 230, 227, 0.12);
    --mono: ui-monospace, 'JetBrains Mono', 'Berkeley Mono', 'SF Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--paper); }
  body {
    margin: 0;
    font-family: var(--mono);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  main { max-width: 880px; margin: 0 auto; padding: 4rem 1.5rem 6rem; }
  header { padding-top: 2rem; }
  .wordmark {
    font-size: clamp(48px, 12vw, 128px);
    line-height: 1;
    letter-spacing: -0.02em;
    font-weight: 400;
    margin: 0;
    position: relative;
    display: inline-block;
  }
  .wordmark::after {
    content: "context";
    position: absolute;
    left: 0;
    top: 48%;
    font-size: 0.5em;
    letter-spacing: -0.02em;
    color: var(--paper);
    opacity: 0.16;
    pointer-events: none;
  }
  .tagline {
    color: var(--muted);
    font-size: clamp(16px, 2.4vw, 22px);
    margin: 0.5rem 0 0;
    font-weight: 400;
  }
  .receipts {
    color: var(--quiet);
    font-size: 13px;
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
  }
  a { color: var(--muted); text-decoration: underline; text-decoration-color: var(--rule); }
  a:hover { color: var(--paper); text-decoration-color: var(--muted); }
  hr { border: 0; border-top: 1px solid var(--rule); margin: 3.5rem 0; }
  section { margin: 3.5rem 0; }
  h1 { color: var(--paper); font-weight: 400; margin: 0 0 1rem; }
  h2 {
    font-size: 14px;
    color: var(--quiet);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 400;
    margin: 0 0 1.5rem;
  }
  h3 { color: var(--paper); font-weight: 400; font-size: 18px; margin: 2rem 0 0.75rem; }
  p { margin: 0 0 1rem; max-width: 60ch; }
  p strong { color: var(--paper); font-weight: 400; }
  .lead { font-size: 18px; color: var(--paper); }
  .lead em { color: var(--muted); font-style: normal; opacity: 0.75; }
  .viz {
    margin: 1.5rem 0;
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    background: var(--bg);
  }
  .viz svg, .viz object { display: block; width: 100%; height: auto; }
  .caption { color: var(--quiet); font-size: 13px; margin-top: 0.5rem; text-align: center; }
  pre {
    background: rgba(232, 230, 227, 0.04);
    border: 1px solid var(--rule);
    padding: 1rem 1.25rem;
    border-radius: 4px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.6;
    color: var(--paper);
  }
  code { color: var(--paper); font-size: 0.95em; }
  pre code { font-size: 14px; }
  pre .c { color: var(--quiet); }
  pre .k { color: var(--paper); }
  pre .v { color: var(--muted); }
  ul.tools {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0.75rem 2rem;
  }
  ul.tools li { border-left: 1px solid var(--rule); padding-left: 1rem; }
  ul.tools code { color: var(--paper); font-size: 14px; display: block; }
  ul.tools span { color: var(--muted); font-size: 13px; }
  ul.posts { list-style: none; padding: 0; margin: 0; }
  ul.posts li { border-left: 1px solid var(--rule); padding: 0.5rem 0 0.5rem 1rem; margin-bottom: 0.75rem; }
  ul.posts li time { color: var(--quiet); font-size: 13px; display: block; }
  ul.posts li a { color: var(--paper); text-decoration: none; }
  ul.posts li a:hover { color: var(--muted); text-decoration: underline; text-decoration-color: var(--rule); }
  footer {
    margin-top: 6rem;
    padding-top: 2rem;
    border-top: 1px solid var(--rule);
    color: var(--quiet);
    font-size: 13px;
    line-height: 1.7;
  }
  .squad { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; margin-top: 0.5rem; }
  .squad span { color: var(--muted); }
  blockquote {
    border-left: 2px solid var(--rule);
    margin: 1.5rem 0;
    padding-left: 1rem;
    color: var(--muted);
  }
  @media (prefers-reduced-motion: reduce) {
    .viz svg *, .viz object { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>
<main>
{{ content }}

<footer>

    <span>built by 7R1PL3F0RC3:</span>
    <span>spaceG.O.A.T.</span>
    <span>m4rq</span>
    <span>lUX</span>
    <span>M3RCUR14L</span>
    <span>4RX</span>
    <span>W3BL0RD</span>
    <span>W4R3Z</span>
    <span>TR1P.L3X</span>
    <span>LSPy</span>
    <span>nug3</span>
  </div>
  <p style="margin-top:1.25rem">
    paper-white on black · monospace · animations respect <code>prefers-reduced-motion</code> ·
    the graph is real data · <a href="{{ '/feed.xml' | relative_url }}">rss</a>
  </p>
</footer>
</main>
</body>
</html>
